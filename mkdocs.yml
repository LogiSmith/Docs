site_name: LogiSmith Docs
site_description: Installation and user guides for the LogiSmith open-source FPGA toolchain
site_author: LogiSmith
site_url: https://logismith.github.io/Docs/
copyright: "© 2026 LogiSmith — MIT License"

repo_url: https://github.com/LogiSmith/Docs
repo_name: LogiSmith/Docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details

plugins:
  - search

nav:
  - Home: index.md
  - Installation:
      - Overview: installation/index.md
      - Ubuntu (native): installation/ubuntu.md
      - WSL2: installation/wsl.md
      - Docker: installation/docker.md
  - Getting started: getting-started.md
  - How it works: how-it-works.md
  - CLI reference: cli.md
  - Troubleshooting & FAQ: troubleshooting.md
  - Anvil developer docs: https://logismith.github.io/Anvil/
